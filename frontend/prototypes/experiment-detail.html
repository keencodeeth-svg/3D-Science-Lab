<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>实验详情页 - 低保真原型</title>
    <link rel="stylesheet" href="./lowfi.css" />
  </head>
  <body>
    <main class="shell">
      <header class="page-head">
        <div>
          <span class="label">Experiment Detail</span>
          <h1>串联与并联电路</h1>
          <p>初中 · 物理 · 八年级 · 预计 12 分钟</p>
        </div>
        <div class="actions">
          <a class="button" href="./student-hall.html">返回大厅</a>
          <a class="button primary" href="./lab-session.html">开始实验</a>
        </div>
      </header>

      <section class="grid-2" style="margin-top:16px;">
        <article class="card">
          <h2>实验目标</h2>
          <ul class="checklist">
            <li>认识电池、开关、小灯泡和导线</li>
            <li>理解串联与并联的连接差异</li>
            <li>比较不同电路的现象变化</li>
          </ul>

          <h2 style="margin-top:20px;">步骤预览</h2>
          <ol class="checklist">
            <li>识别器材</li>
            <li>连接串联电路</li>
            <li>闭合开关观察现象</li>
            <li>重搭并联电路并比较</li>
          </ol>
        </article>

        <article class="card">
          <h2>模式选择</h2>
          <div class="list-grid" style="margin-top:12px;">
            <div class="wireframe-box"><strong>引导模式</strong><p>适合第一次进入，有强提示。</p></div>
            <div class="wireframe-box"><strong>练习模式</strong><p>提示较少，适合独立操作。</p></div>
            <div class="wireframe-box"><strong>考核模式</strong><p>记录错误步骤和完成时长。</p></div>
            <div class="wireframe-box"><strong>器材预览</strong><p>电池盒、开关、小灯泡、导线。</p></div>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
