<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录页 - 低保真原型</title>
    <link rel="stylesheet" href="./lowfi.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="brand" href="./index.html"><span class="brand-mark">3D</span><span>Science Lab</span></a>
        <div class="actions"><a class="button subtle" href="./student-hall.html">跳到学生端</a></div>
      </header>

      <section class="grid-2">
        <article class="card">
          <span class="label">Login</span>
          <h1>欢迎进入 3D Science Lab</h1>
          <p>让用户在 10 秒内找到自己的入口，优先区分学生与教师。</p>
          <div class="tabs">
            <button class="tab active">学生</button>
            <button class="tab">教师</button>
          </div>
          <div class="wireframe-box" style="margin-top:16px;">
            <p><strong>账号/手机号</strong></p>
            <div class="placeholder" style="min-height:56px;">输入框占位</div>
            <p style="margin-top:16px;"><strong>密码</strong></p>
            <div class="placeholder" style="min-height:56px;">输入框占位</div>
            <div class="actions" style="margin-top:16px;">
              <a class="button primary" href="./student-hall.html">登录进入</a>
              <a class="button" href="./student-hall.html">使用演示账号</a>
            </div>
          </div>
        </article>

        <article class="card">
          <span class="label">Why</span>
          <h2>登录页右侧信息</h2>
          <ul class="checklist">
            <li>学生：进入实验大厅，完成老师布置任务</li>
            <li>教师：布置实验、课堂演示、查看班级结果</li>
            <li>学校：演示账号可用于试点沟通</li>
          </ul>
          <div class="banner" style="margin-top:16px;">底部可放：试用申请、常见问题、浏览器支持说明</div>
        </article>
      </section>
    </main>
  </body>
</html>
